{% extends 'base.html' %}

{% block title %}
Edit Booking
{% endblock %}

{% block content %}

<section class="page-section">

    <h1>Edit Booking</h1>

    <form method="POST">

        {% csrf_token %}

        {% if form.errors %}
            <div class="form-errors">
                <p>Please correct the errors below.</p>
            </div>
        {% endif %}

        {{ form.as_p }}

        <button type="submit" class="button">
            Save Changes
        </button>

    </form>

</section>

{% endblock %}
